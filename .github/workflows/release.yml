name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-macos:
    name: Package macOS app
    runs-on: macos-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Package EdgeNotes
        env:
          APP_VERSION: ${{ steps.release.outputs.version }}
        run: ./script/package_release.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/EdgeNotes-macOS.zip \
            dist/EdgeNotes-macOS.zip.sha256 \
            --clobber
